version: '3.3'
services:
  evolution-api:
    image: atendai/evolution-api:latest
    container_name: evolution-api
    restart: always
    ports:
      - "8080:8080"
    environment:
      # Replace http://localhost:8080 with your public VPS IP or domain in production
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=TracePK_Secret_Key_123 # Same key configured in ERP EVOLUTION_API_KEY env
      # Replace http://localhost:3001/api/whatsapp-governance/webhook/whatsapp with your production ERP domain URL
      - WEBHOOK_GLOBAL_URL=http://localhost:3001/api/whatsapp-governance/webhook/whatsapp
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_EVENTS=APPLICATION_STARTUP,QRCODE_UPDATED,MESSAGES_UPSERT,MESSAGES_UPDATE,CONNECTION_UPDATE
    volumes:
      - ./evolution_instances:/evolution/instances
